name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Fat JAR with Maven
      run: mvn clean package

    - name: Build DMG using jpackage
      run: |
        # target ফোল্ডার থেকে .jar ফাইলের নাম খুঁজে বের করা
        JAR_FILE=$(ls target | grep \.jar$ | head -n 1)
        
        # jpackage দিয়ে ম্যাকের .dmg ইনস্টলার তৈরি করা
        jpackage --type dmg \
          --input target/ \
          --main-jar $JAR_FILE \
          --main-class com.lanmessenger.Launcher \
          --name Tuoxido \
          --app-version 1.0.0

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Tuoxido-macOS-Installer
        path: Tuoxido-1.0.0.dmg